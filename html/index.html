<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legends of France v2 — Deck-Builder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="game-area"></div>
    <div id="sidebar">
      <div class="sidebar-title">LEGENDS OF FRANCE</div>
      <div class="sidebar-sub">v2 — HTML Edition</div>
      <div id="log-text"></div>

      <div class="btn-row">
        <button id="btn-end-turn" class="btn">End Turn</button>
        <button id="btn-skip" class="btn" disabled>Skip Reward</button>
        <button id="btn-leave-shop" class="btn btn-shop" style="display:none">Leave Shop</button>
      </div>

      <div>
        <div class="potion-label">Potions:</div>
        <div id="potion-list"></div>
      </div>

      <div id="relic-list"></div>

      <div class="btn-row">
        <button id="btn-save" class="btn btn-save">Save</button>
        <button id="btn-load" class="btn btn-load">Load</button>
        <button id="btn-legacy" class="btn btn-legs">Legacy</button>
        <button id="btn-restart" class="btn btn-restart">Restart Run</button>
        <button id="btn-reset-game" class="btn btn-restart">Restart Game</button>
      </div>

      <div id="meta-stats"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
